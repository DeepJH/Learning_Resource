<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fluent-accent: #0078d4;
            --fluent-accent-hover: #106ebe;
            --fluent-bg: #f3f3f3;
            --fluent-card: rgba(255, 255, 255, 0.7);
            --fluent-text: #242424;
            --fluent-text-secondary: #616161;
            --fluent-border: rgba(0, 0, 0, 0.0578);
            --fluent-shadow: 0 2px 4px rgba(0, 0, 0, 0.04), 0 8px 16px rgba(0, 0, 0, 0.08);
            --fluent-shadow-hover: 0 4px 8px rgba(0, 0, 0, 0.08), 0 12px 24px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--fluent-bg);
            color: var(--fluent-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header with Acrylic effect */
        .header {
            background: var(--fluent-card);
            backdrop-filter: blur(20px) saturate(125%);
            -webkit-backdrop-filter: blur(20px) saturate(125%);
            border-bottom: 1px solid var(--fluent-border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--fluent-accent), #005a9e);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header .status {
            margin-left: auto;
            font-size: 12px;
            color: var(--fluent-text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #0f7b0f;
            border-radius: 50%;
        }

        /* Chat container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        /* Message bubbles */
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: var(--fluent-accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--fluent-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--fluent-border);
            box-shadow: var(--fluent-shadow);
            border-bottom-left-radius: 4px;
        }

        .message .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .message p {
            white-space: pre-wrap;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: var(--fluent-text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        /* Input area with Reveal effect */
        .input-area {
            background: var(--fluent-card);
            backdrop-filter: blur(20px) saturate(125%);
            -webkit-backdrop-filter: blur(20px) saturate(125%);
            border-top: 1px solid var(--fluent-border);
            padding: 16px 24px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--fluent-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.1s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--fluent-accent);
            box-shadow: 0 0 0 1px var(--fluent-accent);
        }

        .input-wrapper input::placeholder {
            color: var(--fluent-text-secondary);
        }

        .send-btn {
            padding: 12px 24px;
            background: var(--fluent-accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .send-btn:hover {
            background: var(--fluent-accent-hover);
            box-shadow: var(--fluent-shadow);
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        .send-btn:disabled {
            background: #c8c8c8;
            cursor: not-allowed;
        }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--fluent-text-secondary);
            text-align: center;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-state h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--fluent-text);
        }

        .empty-state p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">💬</div>
        <h1>Fluent Chat</h1>
        <div class="status">
            <span class="status-dot"></span>
            <span>Mock Mode</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <div class="icon">✨</div>
            <h2>Welcome to Fluent Chat</h2>
            <p>Type a message to get started</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type your message..." 
                autocomplete="off"
            />
            <button class="send-btn" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyState = document.getElementById('emptyState');

        let chatHistory = [];

        function addMessage(role, content) {
            if (emptyState) {
                emptyState.remove();
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = role === 'user' ? 'You' : 'Assistant';

            const p = document.createElement('p');
            p.textContent = content;

            msgDiv.appendChild(label);
            msgDiv.appendChild(p);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            chatHistory.push({ role, content });
        }

        function addTypingIndicator() {
            if (emptyState) {
                emptyState.remove();
            }

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = 'Assistant';

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span>';

            typingDiv.appendChild(label);
            typingDiv.appendChild(typing);
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            messageInput.value = '';
            sendBtn.disabled = true;

            addTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        history: chatHistory,
                    }),
                });

                const data = await response.json();
                removeTypingIndicator();
                addMessage('assistant', data.reply);
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', 'Sorry, there was an error processing your request.');
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        messageInput.focus();
    </script>
</body>
</html>
